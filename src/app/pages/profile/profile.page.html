<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>{{ language === 'zh' ? '個人檔案' : 'My Profile' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- User Info Section -->
  <div class="user-header ion-padding ion-text-center" *ngIf="user">
    <ion-avatar style="margin: auto; width: 100px; height: 100px;">
      <img src="https://ionicframework.com/docs/img/demos/avatar.svg" />
    </ion-avatar>
    <h2>{{ user.username }}</h2>
    <p>{{ user.email }}</p>
  </div>

  <!-- Favorites List -->
  <ion-list-header>
    <ion-label>{{ getFavTitle() }}</ion-label>
  </ion-list-header>

  <ion-list>
    <ion-item *ngFor="let s of favorites" button routerLink="/school-detail/{{s.id}}">
      <ion-label>
        <h2>{{ language === 'zh' ? s.nameZh : s.nameEn }}</h2>
        <p>{{ s.district }}</p>
      </ion-label>
      <ion-icon name="heart" slot="end" color="danger"></ion-icon>
    </ion-item>

    <ion-item *ngIf="favorites.length === 0" lines="none">
      <ion-label class="ion-text-center">{{ getNoFavText() }}</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
