<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start"><ion-back-button defaultHref="main"></ion-back-button></ion-buttons>
    <ion-title>Search</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-searchbar show-cancel-button="always" autofocus="true"></ion-searchbar>
  
  <ion-list>
    <ion-item>
      <ion-label>
        <h2>Sample School Name</h2>
        <p>Kowloon City</p>
      </ion-label>
      <!-- Heart Button to add to favorites -->
      <ion-button slot="end" fill="clear" (click)="addFav()">
        <ion-icon name="heart-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>
</ion-content>
