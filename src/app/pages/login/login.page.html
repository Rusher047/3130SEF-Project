<ion-content class="ion-padding">
  <div class="flex-center">
    <ion-card>
      <ion-card-header>
        <ion-card-title>{{ getLoginTitle() }}</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <ion-item>
          <ion-label position="stacked">{{ getUserLabel() }}</ion-label>
          <ion-input type="text" [(ngModel)]="username" placeholder="e.g. Rusher047"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">{{ getPassLabel() }}</ion-label>
          <ion-input type="password" [(ngModel)]="password">
            <ion-input-password-toggle slot="end"></ion-input-password-toggle>
          </ion-input>
        </ion-item>

        <ion-button expand="block" class="ion-margin-top" (click)="onLogin()">
          {{ getLoginTitle() }}
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
